<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
<title>Create Workout</title>
<link rel="stylesheet" href="website.css">
<script src="workout-make.js" defer></script>
    </head>
    <body>
        <h3>Create Workout</h3>
        <div style="text-align: center;">
            <img src="Workoutimage.jpg" alt="photo" style="max-width: 500px; width: 100%;">
        </div>
        <div class="ExerciseForm">
            <form onsubmit="submitWorkout(event)">

                <label for="WOName">Workout Name</label>
                <input type="text" id="WOName" name="workoutname" placeholder="Name your workout">

                <label for="ex1">Exercise 1</label>
                <input type="text" id="ex1" name="exerciseone" placeholder="Input Exercise">

                <label for="ex2">Exercise 2</label>
                <input type="text" id="ex2" name="exercisetwo" placeholder="Input Exercise">

                <label for="ex3">Exercise 3</label>
                <input type="text" id="ex3" name="exercisethree" placeholder="Input Exercise">

                <label for="ex4">Exercise 4</label>
                <input type="text" id="ex4" name="exercisefour" placeholder="Input Exercise">

                <button type="button" class="Addmore" id="addEx" onclick="addExercise()">+ Exercise</button>
                <button type="button" class="Addmore" id="subEx" onclick="removeExercise()">- Exercise</button>

              

                <input type="submit" value="Submit">
            </form>
        </div>
    </body>

    <button onclick="location.href='dashboard.html'">Dashboard</button>



</html>
