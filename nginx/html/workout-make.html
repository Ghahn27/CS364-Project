<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
<title>Create Workout</title>
<link rel="stylesheet" href="website.css">
<script src="workout-make.js" defer></script>
    </head>
    <body>
        <h3>Create Workout</h3>
        <div style="text-align: center;">
            <img src="Workoutimage.jpg" alt="photo" style="max-width: 500px; width: 100%;">
        </div>
        <div class="ExerciseForm">
            <form onsubmit="submitWorkout(event)">

                <label for="WOName">Workout Name</label>
                <input type="text" id="WOName" name="workoutname" placeholder="Name your workout">

                <label for="set">Sets</label>
                <input type="text" id="set" name="Sets" placeholder="Input Sets">

                <label for="rep">Reps</label>
                <input type="text" id="rep" name="Reps" placeholder="Input Reps">

                <label for="wei">Weight</label>
                <input type="text" id="wei" name="Weight" placeholder="Input Weight">
                
                <input type="submit" value="Submit">
            </form>
        </div>
    </body>

    <button onclick="location.href='dashboard.html'">Dashboard</button>



</html>
